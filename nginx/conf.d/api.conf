# ══════════════════════════════════════════════════════════════════════════════
#  nginx/conf.d/api.conf — Reverse Proxy Server Block
#  Logistics Validation API
#
#  Upstream: FastAPI/Uvicorn container reachable via Docker Compose
#            service name `api` on port 8000 (internal network only).
# ══════════════════════════════════════════════════════════════════════════════

# ── Upstream definition ──────────────────────────────────────────────────────
# Docker Compose DNS resolves the service name `api` to the container IP.
# keepalive 32 → Nginx maintains a pool of up to 32 persistent connections
# to the upstream, avoiding TCP handshake overhead on every request.
upstream fastapi_backend {
    server api:8000;
    keepalive 32;
}


# ── Server block ─────────────────────────────────────────────────────────────
server {
    listen       80;
    server_name  _;      # Accept any Host header (single-service deployment)

    # ── Security Headers ─────────────────────────────────────────────────────
    # These headers are sent with every response regardless of status code.

    # Prevent browsers from MIME-sniffing the response content type.
    add_header X-Content-Type-Options   "nosniff"       always;

    # Disallow embedding in iframes (clickjacking protection).
    add_header X-Frame-Options          "DENY"          always;

    # Legacy XSS filter for older browsers (harmless for modern ones).
    add_header X-XSS-Protection         "1; mode=block" always;

    # Instruct browsers not to cache API responses (they contain
    # dynamic integrity data, not static assets).
    add_header Cache-Control            "no-store"      always;

    # ── Request size limit ───────────────────────────────────────────────────
    # Reject bodies larger than 512 KB at the Nginx layer before they
    # reach the application. This is a first-line DoS mitigation.
    client_max_body_size 512k;

    # ── Proxy timeouts ───────────────────────────────────────────────────────
    # connect: time to establish a TCP connection to the upstream.
    # send:    time to transmit the full request to the upstream.
    # read:    time to receive the full response from the upstream.
    proxy_connect_timeout  5s;
    proxy_send_timeout    10s;
    proxy_read_timeout    30s;

    # ── Proxy pass ───────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://fastapi_backend;

        # Use HTTP/1.1 — required for keepalive connections.
        proxy_http_version 1.1;

        # Clear the Connection header so Nginx manages keepalives,
        # not the downstream client.
        proxy_set_header   Connection        "";

        # Forward the original Host header so FastAPI can reconstruct URLs.
        proxy_set_header   Host              $host;

        # Forward the real client IP for logging and rate-limiting upstream.
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable buffering for streaming-friendly responses.
        # For this API (small JSON payloads) it has minimal impact,
        # but it is good practice for future extensibility.
        proxy_buffering    off;
    }

    # ── Block hidden files (.git, .env, etc.) ────────────────────────────────
    # Prevent accidental exposure of dot-files if the document root
    # were ever configured to serve static files alongside the API.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
