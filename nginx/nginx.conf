# ══════════════════════════════════════════════════════════════════════════════
#  nginx/nginx.conf — Main Nginx Configuration
#  Logistics Validation API
# ══════════════════════════════════════════════════════════════════════════════

# Run worker processes as the unprivileged `nginx` user (default in the
# official nginx:alpine image). Never run as root.
user  nginx;

# `auto` spawns one worker per CPU core — optimal for I/O-bound proxying.
worker_processes  auto;

# Log errors to stderr so Docker captures them in the container log stream.
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;


events {
    # Maximum simultaneous connections per worker.
    # Total capacity = worker_processes × worker_connections.
    worker_connections  1024;

    # Accept as many connections as possible per wake-up (Linux epoll).
    multi_accept on;
}


http {
    # ── MIME types ───────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    # Include the X-Forwarded-For header in access logs so that the real
    # client IP is recorded even after proxying.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;   # Batch TCP packets for efficiency with sendfile
    tcp_nodelay     on;   # Send small packets immediately (good for proxying)
    keepalive_timeout  65;

    # ── Security defaults ────────────────────────────────────────────────────
    # Hide Nginx version from error pages and the Server response header.
    server_tokens  off;

    # Limit the size of client request bodies globally.
    # The per-location directive in api.conf may tighten this further.
    client_max_body_size  1m;

    # ── Gzip compression ─────────────────────────────────────────────────────
    # Compress JSON responses to reduce bandwidth consumption.
    gzip              on;
    gzip_types        application/json text/plain;
    gzip_min_length   256;
    gzip_comp_level   4;

    # ── Include virtual-host configurations ──────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
