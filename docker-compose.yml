# ══════════════════════════════════════════════════════════════════════════════
#  docker-compose.yml
#  Logistics Validation API — Local / CI Orchestration
#
#  Services:
#    api   — FastAPI + Uvicorn (NOT exposed to host; internal network only)
#    nginx — Reverse proxy (only port 80 is published to the host)
#
#  Network topology:
#    Host :80  →  nginx:80  →  api:8000  (internal bridge network)
#
#  Security:
#    • Port 8000 of the `api` container is NOT published; Nginx is the
#      sole ingress point, enforcing all proxy security headers.
#    • Services run under non-root users (enforced in Dockerfile / nginx image).
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── FastAPI Application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      # Target the lean runner stage (not the builder with dev tools).
      target: runner
    image: logistics-api:latest
    container_name: logistics_api

    # Port 8000 is intentionally NOT published to the host.
    # All external traffic must flow through Nginx.
    expose:
      - "8000"

    # Runtime environment — override via a .env file or CI secrets.
    environment:
      APP_NAME: "Logistics Validation API"
      APP_VERSION: "1.0.0"
      DOCS_ENABLED: "true"    # Set to "false" in production
      HOST: "0.0.0.0"
      PORT: "8000"

    # Docker-native liveness probe.
    # start_period gives Uvicorn time to import the application before
    # the first probe fires; avoids false-negative restarts on startup.
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

    restart: unless-stopped

    networks:
      - logistics_net

    # Read-only filesystem where possible; /tmp is writable for Uvicorn internals.
    tmpfs:
      - /tmp

    # Resource limits — tune for your host.
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: logistics_nginx

    ports:
      # Only port 80 is published to the host.
      # Add "443:443" here (plus TLS certs) for HTTPS termination.
      - "80:80"

    volumes:
      # Mount configs read-only — the Nginx process has no reason to write them.
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/api.conf:/etc/nginx/conf.d/api.conf:ro

    # The official nginx:alpine image ships with a default.conf that defines
    # a catch-all server block on port 80. If left in place alongside our
    # api.conf, nginx loads two server blocks on the same port; depending on
    # alphabetical ordering it may serve the wrong block (returning 404 instead
    # of proxying to FastAPI). We remove it before nginx starts.
    command: >
      /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

    # Nginx only starts after the API is healthy.
    # Using `service_healthy` (not just `service_started`) guarantees
    # the upstream is actually ready to serve traffic.
    depends_on:
      api:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped

    networks:
      - logistics_net

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M


# ── Shared Internal Network ───────────────────────────────────────────────────
networks:
  logistics_net:
    driver: bridge
    # Disable ICC (inter-container communication) if you add more services
    # that should not talk to each other directly.
    # driver_opts:
    #   com.docker.network.bridge.enable_icc: "false"
